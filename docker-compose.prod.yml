# Production compose — uses Docker secrets for all sensitive values.
#
# Setup
# ─────
# 1. Create the secrets directory and populate each file:
#
#      mkdir -p secrets
#      echo "strong-root-password"         > secrets/mysql_root_password
#      echo "ragagent"                     > secrets/mysql_password
#      echo "sk-..."                       > secrets/openai_api_key
#      echo "$(openssl rand -base64 64)"   > secrets/auth_jwt_secret
#      echo "$(openssl rand -base64 32)"   > secrets/scheduler_service_key
#      # ... (see full list below)
#      chmod 600 secrets/*
#
# 2. Run:
#      docker compose -f docker-compose.prod.yml up -d --build
#
# Secret files live in ./secrets/ which is git-ignored.
# Each file name (lowercased) maps to the env var of the same name (uppercased).
# docker-entrypoint.sh in the backend image handles the conversion.

version: '3.8'

# ── Secret definitions ────────────────────────────────────────────────────────
secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password
  mysql_password:
    file: ./secrets/mysql_password
  weaviate_api_key:
    file: ./secrets/weaviate_api_key
  openai_api_key:
    file: ./secrets/openai_api_key
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  openrouter_api_key:
    file: ./secrets/openrouter_api_key
  auth_jwt_secret:
    file: ./secrets/auth_jwt_secret
  resend_api_key:
    file: ./secrets/resend_api_key
  resend_from_email:
    file: ./secrets/resend_from_email
  scheduler_service_key:
    file: ./secrets/scheduler_service_key
  google_client_id:
    file: ./secrets/google_client_id
  google_client_secret:
    file: ./secrets/google_client_secret
  figma_client_id:
    file: ./secrets/figma_client_id
  figma_client_secret:
    file: ./secrets/figma_client_secret
  telegram_bot_token:
    file: ./secrets/telegram_bot_token
  telegram_bot_username:
    file: ./secrets/telegram_bot_username

services:

  # ── Vector store ─────────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
      LOG_LEVEL: 'info'
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Relational DB ─────────────────────────────────────────────────────────────
  # MySQL natively supports *_FILE env vars for its own password config.
  mysql:
    image: mysql:latest
    container_name: ragagent-mysql
    ports:
      - "3307:3306"
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-ragagent}
      MYSQL_USER: ${MYSQL_USER:-ragagent}
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    secrets:
      - mysql_root_password
      - mysql_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u ${MYSQL_USER:-ragagent} -p\"$(cat /run/secrets/mysql_password)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Go scheduler microservice ─────────────────────────────────────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: ragagent-scheduler
    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    secrets:
      - mysql_password
      - scheduler_service_key
    environment:
      PORT: 8082
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-ragagent}
      MYSQL_USER: ${MYSQL_USER:-ragagent}
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      BACKEND_URL: http://backend:8081
      SCHEDULER_SERVICE_KEY_FILE: /run/secrets/scheduler_service_key
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Spring Boot backend ───────────────────────────────────────────────────────
  # docker-entrypoint.sh reads /run/secrets/* → env vars before the JVM starts.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragagent-backend
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    secrets:
      - mysql_password
      - weaviate_api_key
      - openai_api_key
      - anthropic_api_key
      - openrouter_api_key
      - auth_jwt_secret
      - resend_api_key
      - resend_from_email
      - scheduler_service_key
      - google_client_id
      - google_client_secret
      - figma_client_id
      - figma_client_secret
      - telegram_bot_token
      - telegram_bot_username
    environment:
      # ── Non-secret config (safe to put inline) ──────────────────────────────
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-ragagent}
      MYSQL_USER: ${MYSQL_USER:-ragagent}
      # ── Weaviate
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
      # ── LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      # Embeddings use Ollama (nomic-embed-text) running on the host.
      # Switch to EMBEDDING_PROVIDER=openai if you prefer OpenAI text-embedding-3-small.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openrouter}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-6}
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-openai/gpt-4o-mini}"
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-qwen/qwen3-embedding-4b}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-http://host.docker.internal:11434}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-nomic-embed-text}
      # ── Auth (non-secret flags)
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_JWT_EXPIRY_HOURS: ${AUTH_JWT_EXPIRY_HOURS:-24}
      AUTH_OTP_EXPIRY_MINUTES: ${AUTH_OTP_EXPIRY_MINUTES:-10}
      # ── Passkey (WebAuthn)
      AUTH_PASSKEY_RP_ID: ${AUTH_PASSKEY_RP_ID:-localhost}
      AUTH_PASSKEY_RP_NAME: ${AUTH_PASSKEY_RP_NAME:-RAG Agent}
      AUTH_PASSKEY_ORIGIN: ${AUTH_PASSKEY_ORIGIN:-http://localhost:3000}
      # ── Resend (RESEND_API_KEY + RESEND_FROM_EMAIL come from secrets)
      # ── Web fetch
      WEB_FETCH_ENABLED: ${WEB_FETCH_ENABLED:-true}
      WEB_FETCH_TIMEOUT: ${WEB_FETCH_TIMEOUT:-10}
      WEB_FETCH_MAX_CHARS: ${WEB_FETCH_MAX_CHARS:-50000}
      # ── Connectors (credentials come from secrets; TELEGRAM_BOT_USERNAME is non-secret)
      CONNECTOR_CALLBACK_BASE_URL: ${CONNECTOR_CALLBACK_BASE_URL:-http://localhost:3000}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  # No secrets needed — the frontend only talks to the backend/scheduler, never
  # directly to any external API.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8081
        AUTH_ENABLED: ${AUTH_ENABLED:-true}
        AUTH_JWT_EXPIRY_HOURS: ${AUTH_JWT_EXPIRY_HOURS:-24}
    container_name: ragagent-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8081
      SCHEDULER_URL: http://scheduler:8082
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_JWT_EXPIRY_HOURS: ${AUTH_JWT_EXPIRY_HOURS:-24}

volumes:
  weaviate_data:
  mysql_data:
