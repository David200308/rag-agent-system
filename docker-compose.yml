version: '3.8'

services:

  # ── Vector store ──────────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
      LOG_LEVEL: 'info'
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Relational DB (auth: whitelist, OTP, JWT) ─────────────────────────────────
  mysql:
    image: mysql:latest
    container_name: ragagent-mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB:-ragagent}
      MYSQL_USER: ${MYSQL_USER:-ragagent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ragagent}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragagent-backend
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    environment:
      # ── Database
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-ragagent}
      MYSQL_USER: ${MYSQL_USER:-ragagent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ragagent}
      # ── Weaviate
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-}
      # ── LLM provider (openai | anthropic | openrouter | local)
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-6}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-http://host.docker.internal:11434}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-nomic-embed-text}
      # ── Auth
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-changeme-use-a-long-random-base64-string-in-production}
      AUTH_JWT_EXPIRY_HOURS: ${AUTH_JWT_EXPIRY_HOURS:-24}
      AUTH_OTP_EXPIRY_MINUTES: ${AUTH_OTP_EXPIRY_MINUTES:-10}
      # ── Resend (email OTP)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@example.com}
      # ── Web fetch
      WEB_FETCH_ENABLED: ${WEB_FETCH_ENABLED:-true}
      WEB_FETCH_TIMEOUT: ${WEB_FETCH_TIMEOUT:-10}
      WEB_FETCH_MAX_CHARS: ${WEB_FETCH_MAX_CHARS:-50000}
      # ── Connectors (Google Workspace + Figma OAuth)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FIGMA_CLIENT_ID: ${FIGMA_CLIENT_ID:-}
      FIGMA_CLIENT_SECRET: ${FIGMA_CLIENT_SECRET:-}
      CONNECTOR_CALLBACK_BASE_URL: ${CONNECTOR_CALLBACK_BASE_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Go scheduler microservice ─────────────────────────────────────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: ragagent-scheduler
    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      PORT: 8082
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-ragagent}
      MYSQL_USER: ${MYSQL_USER:-ragagent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ragagent}
      BACKEND_URL: http://backend:8081
      SCHEDULER_SERVICE_KEY: ${SCHEDULER_SERVICE_KEY:-scheduler-secret-key}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8081
        AUTH_ENABLED: ${AUTH_ENABLED:-false}
        AUTH_JWT_EXPIRY_HOURS: ${AUTH_JWT_EXPIRY_HOURS:-24}
    container_name: ragagent-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8081
      SCHEDULER_URL: http://scheduler:8082
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_JWT_EXPIRY_HOURS: ${AUTH_JWT_EXPIRY_HOURS:-24}

volumes:
  weaviate_data:
  mysql_data:
